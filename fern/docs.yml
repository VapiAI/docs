instances:
  - url: docs.vapi.ai

title: Vapi | Docs

logo:
  light: ./docs/static/logo/light.png
  dark: ./docs/static/logo/dark.png

favicon: ./docs/static/favicon.ico

colors:
  accentPrimary:
    light: "#047857"
    dark: "#34D399"

navbar-links:
  - type: secondary
    text: Dashboard
    url: https://dashboard.vapi.ai
  - type: secondary
    text: Community
    url: https://discord.gg/pUFNcf2WmH
  - type: secondary
    text: Support
    url: https://vapi.ai/support

announcement:
  text: "New: Vapi now supports native Text-based conversations! Read more →"
  url: "/text-based-conversations"

layout:
  header-height: 70px
  searchbar-placement: header
  tabs-placement: header
  content-width: 55rem

background-image:
  light: ./docs/static/bg-light.svg
  dark: ./docs/static/bg-dark.svg

typography:
  bodyFont:
    name: Inter
    paths:
      - path: ./docs/static/fonts/Inter-Regular.woff2
        weight: "400"
        style: normal
      - path: ./docs/static/fonts/Inter-Medium.woff2
        weight: "500"
        style: normal
      - path: ./docs/static/fonts/Inter-SemiBold.woff2
        weight: "600"
        style: normal
  headingsFont:
    name: Inter
    paths:
      - path: ./docs/static/fonts/Inter-SemiBold.woff2
        weight: "600"
        style: normal
      - path: ./docs/static/fonts/Inter-Bold.woff2
        weight: "700"
        style: normal
  codeFont:
    name: JetBrains Mono
    paths:
      - path: ./docs/static/fonts/JetBrainsMono-Regular.woff2
        weight: "400"
        style: normal

tabs:
  docs:
    display-name: Documentation
    slug: docs
    icon: book-open
  api-reference:
    display-name: API Reference
    slug: api-reference
    icon: puzzle
  sdks:
    display-name: SDKs
    slug: sdks
    icon: code
  changelog:
    display-name: What's New
    slug: whats-new
    changelog: ./changelog
    icon: history

