      title: AssistantHookCallEnding
    AssistantHookAssistantSpeechInterrupted:
      title: AssistantHookAssistantSpeechInterrupted
    AssistantHookCustomerSpeechInterrupted:
      title: AssistantHookCustomerSpeechInterrupted
    TransferPhoneNumberHookAction:
      title: TransferPhoneNumberHookAction
      description: >-
        A phone-number hook action that transfers the call to a phone number or
        SIP destination.
    SayPhoneNumberHookAction:
      title: SayPhoneNumberHookAction
      description: >-
        A phone-number hook action that speaks an exact message to the caller.
    PhoneNumberHookCallRinging:
      title: PhoneNumberHookCallRinging
      description: >-
        Runs configured transfer or message actions when an incoming call rings
        and its caller-number prefix filters match.
    PhoneNumberHookCallEnding:
      description: >-
        Runs configured transfer or message actions when a call ends with a
        matching assistant-request failure reason.
    PhoneNumberCallRingingHookFilter:
      description: >-
        Matches an incoming caller's phone number against one or more prefixes
        before a ringing hook runs.
    PhoneNumberCallEndingHookFilter:
      description: >-
        Matches the call's ended reason against configured assistant-request
        failure reasons before an ending hook runs.
    CreateCustomerDTO:
      description: >-
        Customer details used for call delivery and assistant personalization,
        including phone or SIP destination, contact identifiers, extension, and
        assistant overrides.
    SchedulePlan:
      description: >-
        Time window that controls the earliest and latest time a call may begin.
    DialPlanEntry:
      description: >-
        Associates a phone number with the customers to dial through that number
        in a batch call plan.
    SipAuthentication:
      description: >-
        Realm, username, and password used to authenticate SIP requests.
    ImportTwilioPhoneNumberDTO:
      description: >-
        Configuration for importing a Twilio phone number into Vapi, including
        Twilio credentials, routing target, fallback destination, hooks, SMS,
        and server settings.
    Analysis:
      description: >-
        Post-call analysis results, including summary, structured data, and
        success evaluation outputs.
    Artifact:
      description: >-
        Artifacts generated during a call, including messages, recordings,
        transcript, logs, packet capture, workflow-node data, variables,
        performance metrics, structured outputs, scorecards, and transfers.
    NodeArtifact:
      description: >-
        Messages and variable values captured while a workflow node was active.
    AssistantActivation:
      description: >-
        Identifies an assistant that became active during a call.
    Recording:
      description: >-
        Call recording locations, including stereo, video, and separated mono
        recording URLs.
    Mono:
      description: >-
        Mono recording URLs for the combined call and isolated assistant and
        customer audio.
    RecordingConsent:
      description: >-
        Result of the recording-consent flow, including consent type and the
        time consent was granted.
    Compliance:
      description: >-
        Compliance information captured for a call, including recording consent.
    ComplianceOverride:
      description: >-
        Overrides storage behavior for an output when HIPAA compliance is
        enabled.
    PerformanceMetrics:
      description: >-
        Call performance measurements, including per-turn and average provider,
        endpointing, transport, and interruption metrics.
    TurnLatency:
      description: >-
        Model, voice, transcription, endpointing, and total latency measurements
        for a conversation turn.
    Monitor:
      description: >-
        Live monitoring data for a call, including attached monitor results and
        listening and control URLs.
      properties:
        monitors:
          description: Results produced by monitors attached to the call.
    MonitorResult:
      description: >-
        Result of evaluating an attached monitor's filter for a call.
      properties:
        monitorId:
          description: Unique identifier of the monitor that produced this result.
        filterPassed:
          description: Whether the monitor's filter matched the call.
    CallBatchError:
      description: >-
        Error returned for one customer entry in a batch call request.
      properties:
        customer:
          description: Customer configuration associated with the failed call.
        error:
          description: Error message explaining why the call could not be created.
