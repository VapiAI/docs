x-fern-pagination:
  offset: $request.page
  results: $response.results
info:
  description: >-
    Vapi is a developer platform for building voice AI agents that make and
    receive phone calls, run web voice experiences, and integrate with external
    systems through tools and webhooks.
paths:
  /enterprise:
    post:
      x-fern-ignore: true
  /call:
    get:
      description: >-
        Returns calls for the authenticated organization. Filter results by call
        ID, assistant ID, phone number ID, or creation and update timestamps.
      x-fern-sdk-group-name:
        - calls
      x-fern-sdk-method-name: list
    post:
      description: >-
        Creates a call using an assistant or squad. The request can reference
        saved resources or include transient configurations.
      x-fern-sdk-group-name:
        - calls
      x-fern-sdk-method-name: create
  /call/{id}:
    get:
      description: >-
        Returns the call identified by its ID, including its status,
        configuration, and available call data.
      x-fern-sdk-group-name:
        - calls
      x-fern-sdk-method-name: get
    delete:
      description: Deletes the call identified by its ID.
      x-fern-sdk-group-name:
        - calls
      x-fern-sdk-method-name: delete
    patch:
      description: Updates the call identified by its ID.
      x-fern-sdk-group-name:
        - calls
      x-fern-sdk-method-name: update
  /chat:
    get:
      x-fern-availability: beta
      x-fern-sdk-group-name:
        - chats
      x-fern-sdk-method-name: list
    post:
      x-fern-availability: beta
      x-fern-sdk-group-name:
        - chats
      x-fern-sdk-method-name: create
  /chat/{id}:
    get:
      x-fern-availability: beta
      x-fern-sdk-group-name:
        - chats
      x-fern-sdk-method-name: get
    delete:
      x-fern-availability: beta
      x-fern-sdk-group-name:
        - chats
      x-fern-sdk-method-name: delete
  /chat/responses:
    post:
      x-fern-availability: beta
      x-fern-sdk-group-name:
        - chats
      x-fern-sdk-method-name: createResponse
  /session:
    get:
      x-fern-availability: beta
      x-fern-sdk-group-name:
        - sessions
      x-fern-sdk-method-name: list
    post:
      x-fern-availability: beta
      x-fern-sdk-group-name:
        - sessions
      x-fern-sdk-method-name: create
  /session/{id}:
    get:
      x-fern-availability: beta
      x-fern-sdk-group-name:
        - sessions
      x-fern-sdk-method-name: get
    delete:
      x-fern-availability: beta
      x-fern-sdk-group-name:
        - sessions
      x-fern-sdk-method-name: delete
    patch:
      x-fern-availability: beta
      x-fern-sdk-group-name:
        - sessions
      x-fern-sdk-method-name: update
  /assistant:
    get:
      description: >-
        Returns assistants for the authenticated organization. Filter results
        by creation or update timestamps and limit the number returned.
      x-fern-sdk-group-name:
        - assistants
      x-fern-sdk-method-name: list
    post:
      description: >-
        Creates a reusable assistant configuration containing the model, voice,
        transcriber, tools, prompts, and call behavior.
      x-fern-sdk-group-name:
        - assistants
      x-fern-sdk-method-name: create
  /assistant/{id}:
    get:
      description: Returns the assistant identified by its ID.
      x-fern-sdk-group-name:
        - assistants
      x-fern-sdk-method-name: get
    delete:
      description: Deletes the assistant identified by its ID.
      x-fern-sdk-group-name:
        - assistants
      x-fern-sdk-method-name: delete
    patch:
      description: >-
        Updates the specified fields of the assistant identified by its ID.
      x-fern-sdk-group-name:
        - assistants
      x-fern-sdk-method-name: update
  /phone-number:
    get:
      description: >-
        Returns phone numbers for the authenticated organization. Filter results
        by creation or update timestamps and limit the number returned.
      x-fern-sdk-group-name:
        - phoneNumbers
      x-fern-sdk-method-name: list
    post:
      description: >-
        Creates a Vapi phone number or imports a phone number from a supported
        provider, including Twilio, Vonage, Telnyx, or a bring-your-own provider.
      x-fern-sdk-group-name:
        - phoneNumbers
      x-fern-sdk-method-name: create
  /v2/phone-number:
    get:
      description: >-
        Returns a paginated list of phone numbers for the authenticated
        organization. Search by name, number, or SIP URI using a partial,
        case-insensitive match, and filter by creation or update timestamps.
  /phone-number/{id}:
    get:
      description: Returns the phone number resource identified by its ID.
      x-fern-sdk-group-name:
        - phoneNumbers
      x-fern-sdk-method-name: get
    delete:
      description: Deletes the phone number resource identified by its ID.
      x-fern-sdk-group-name:
        - phoneNumbers
      x-fern-sdk-method-name: delete
    patch:
      description: >-
        Updates the specified fields of the phone number resource identified by
        its ID.
      x-fern-sdk-group-name:
        - phoneNumbers
      x-fern-sdk-method-name: update
  /squad:
    get:
      description: >-
        Returns squads for the authenticated organization. Filter results by
        creation or update timestamps and limit the number returned.
      x-fern-sdk-group-name:
        - squads
      x-fern-sdk-method-name: list
    post:
      description: >-
        Creates a squad that coordinates multiple assistants and their handoffs
        during a conversation.
      x-fern-sdk-group-name:
        - squads
      x-fern-sdk-method-name: create
  /squad/{id}:
    get:
      description: Returns the squad identified by its ID.
      x-fern-sdk-group-name:
        - squads
      x-fern-sdk-method-name: get
    delete:
      description: Deletes the squad identified by its ID.
      x-fern-sdk-group-name:
        - squads
      x-fern-sdk-method-name: delete
    patch:
      description: Updates the specified fields of the squad identified by its ID.
      x-fern-sdk-group-name:
        - squads
      x-fern-sdk-method-name: update
  /tool:
    get:
      description: >-
        Returns reusable tools for the authenticated organization. Filter
        results by creation or update timestamps and limit the number returned.
      x-fern-sdk-group-name:
        - tools
      x-fern-sdk-method-name: list
    post:
      description: >-
        Creates a reusable tool that assistants can invoke during conversations.
      x-fern-sdk-group-name:
        - tools
      x-fern-sdk-method-name: create
  /tool/{id}:
    get:
      description: Returns the tool identified by its ID.
      x-fern-sdk-group-name:
        - tools
      x-fern-sdk-method-name: get
    delete:
      description: Deletes the tool identified by its ID.
      x-fern-sdk-group-name:
        - tools
      x-fern-sdk-method-name: delete
    patch:
      description: Updates the specified fields of the tool identified by its ID.
      x-fern-sdk-group-name:
        - tools
      x-fern-sdk-method-name: update
  /file:
    get:
      description: Returns files uploaded to the authenticated organization.
      x-fern-sdk-group-name:
        - files
      x-fern-sdk-method-name: list
    post:
      description: Uploads a file for use with a Vapi knowledge base.
      x-fern-sdk-group-name:
        - files
      x-fern-sdk-method-name: create
  /file/{id}:
    get:
      description: Returns the uploaded file identified by its ID.
      x-fern-sdk-group-name:
        - files
      x-fern-sdk-method-name: get
    delete:
      description: Deletes the uploaded file identified by its ID.
      x-fern-sdk-group-name:
        - files
      x-fern-sdk-method-name: delete
    patch:
      description: Updates the name of the uploaded file identified by its ID.
      x-fern-sdk-group-name:
        - files
      x-fern-sdk-method-name: update
  /campaign:
    get:
      description: >-
        Returns outbound calling campaigns for the authenticated organization.
        Filter results by campaign ID, status, or creation and update timestamps.
    post:
      description: Creates an outbound calling campaign that calls a set of customers.
  /campaign/{id}:
    get:
      description: Returns the outbound calling campaign identified by its ID.
    delete:
      description: Deletes the outbound calling campaign identified by its ID.
    patch:
      description: >-
        Updates the outbound calling campaign identified by its ID. Campaigns
        can be ended by updating their status to `ended`.
  /structured-output:
    get:
      description: >-
        Returns structured-output definitions for the authenticated
        organization. Filter results by ID, name, or creation and update
        timestamps.
    post:
      description: >-
        Creates a reusable definition for extracting validated data from
        conversations using an AI model or regular expression.
  /structured-output/{id}:
    get:
      description: Returns the structured-output definition identified by its ID.
    delete:
      description: Deletes the structured-output definition identified by its ID.
    patch:
      description: >-
        Updates the structured-output definition identified by its ID.
  /structured-output/run:
    post:
      description: >-
        Runs a saved or transient structured-output definition against one or
        more calls, optionally returning a preview without updating call
        artifacts.
  /reporting/insight:
    get:
      description: >-
        Returns saved reporting insights for the authenticated organization.
        Filter results by ID or creation and update timestamps.
    post:
      description: >-
        Creates a saved reporting insight that queries call data and presents
        the results as a bar chart, pie chart, line chart, or text value.
  /reporting/insight/{id}:
    get:
      description: Returns the reporting insight identified by its ID.
    delete:
      description: Deletes the reporting insight identified by its ID.
    patch:
      description: Updates the reporting insight identified by its ID.
  /reporting/insight/{id}/run:
    post:
      description: >-
        Runs a saved reporting insight, optionally overriding its time range and
        response format.
  /reporting/insight/preview:
    post:
      description: >-
        Runs an insight definition without first saving it, returning a preview
        of the resulting chart or text value.
  /eval:
    get:
      description: >-
        Returns eval definitions for the authenticated organization. Filter
        results by ID or creation and update timestamps.
    post:
      description: >-
        Creates a reusable eval that defines a mock conversation and checkpoints
        for evaluating assistant responses and tool calls.
  /eval/{id}:
    get:
      description: Returns the eval definition identified by its ID.
    delete:
      description: Deletes the eval definition identified by its ID.
    patch:
      description: Updates the eval definition identified by its ID.
  /eval/run:
    get:
      description: >-
        Returns eval runs for the authenticated organization. Filter results by
        ID or creation and update timestamps.
    post:
      description: >-
        Runs a saved or transient eval against an assistant or squad and creates
        an eval-run record containing the results.
  /eval/run/{id}:
    get:
      description: Returns the eval run identified by its ID.
    delete:
      description: Deletes the eval run identified by its ID.
  /observability/scorecard:
    get:
      description: >-
        Returns scorecards for the authenticated organization. Filter results by
        ID or creation and update timestamps.
    post:
      description: >-
        Creates a scorecard containing metrics, scoring conditions, and optional
        links to assistants whose calls should be evaluated.
  /observability/scorecard/{id}:
    get:
      description: Returns the scorecard identified by its ID.
    delete:
      description: Deletes the scorecard identified by its ID.
    patch:
      description: Updates the scorecard identified by its ID.
  /provider/{provider}/{resourceName}:
    get:
      description: >-
        Returns a paginated list of provider resources for the authenticated
        organization. Filter pronunciation dictionaries by provider, resource
        ID, or creation and update timestamps.
    post:
      description: >-
        Creates a pronunciation-dictionary resource for a supported provider,
        currently Cartesia or ElevenLabs.
  /provider/{provider}/{resourceName}/{id}:
    get:
      description: >-
        Returns the provider resource identified by its Vapi resource ID.
    delete:
      description: >-
        Deletes the provider resource identified by its Vapi resource ID.
    patch:
      description: >-
        Updates the provider resource identified by its Vapi resource ID.
  /knowledge-base:
    get:
      x-fern-sdk-group-name:
        - knowledgeBases
      x-fern-ignore: true
      x-fern-sdk-method-name: list
    post:
      x-fern-sdk-group-name:
        - knowledgeBases
      x-fern-ignore: true
      x-fern-sdk-method-name: create
  /knowledge-base/{id}:
    get:
      x-fern-sdk-group-name:
        - knowledgeBases
      x-fern-ignore: true
      x-fern-sdk-method-name: get
    delete:
      x-fern-sdk-group-name:
        - knowledgeBases
      x-fern-ignore: true
      x-fern-sdk-method-name: delete
    patch:
      x-fern-sdk-group-name:
        - knowledgeBases
      x-fern-ignore: true
      x-fern-sdk-method-name: update
  /analytics:
    post:
      description: >-
        Runs one or more metric queries against call or subscription data using
        the requested time range, groupings, and aggregate operations.
      x-fern-sdk-group-name:
        - analytics
      x-fern-sdk-method-name: get
    get:
      x-fern-ignore: true
  /logs:
    get:
      x-fern-pagination: true
      x-fern-ignore: true
      x-fern-sdk-group-name:
        - logs
      x-fern-sdk-method-name: get
components:
  schemas:
    CreateAssistantDTO:
      description: >-
        Configuration used to create an assistant, including its model, voice,
        transcriber, prompts, tools, messaging, and conversation behavior.
      properties:
        firstMessageInterruptionsEnabled:
          description: >-
            Set to `true` to allow the user to interrupt the assistant while it
            speaks the first message. Default is `false`.
        compliancePlan:
          description: >-
            Compliance settings for the assistant, including HIPAA and PCI
            behavior, security filtering, and recording consent.
        keypadInputPlan:
          description: >-
            Configuration for collecting and processing DTMF keypad input
            during calls.
        serverMessages:
          items:
            x-fern-enum:
              "transcript[transcriptType='final']":
                name: FinalTranscript
    AssistantOverrides:
      description: >-
        Per-call or handoff overrides for an assistant's providers, messages,
        tools, credentials, call behavior, and server configuration.
      properties:
        firstMessageInterruptionsEnabled:
          description: >-
            Set to `true` to allow the user to interrupt the assistant while it
            speaks the first message. Default is `false`.
        tools:append:
          description: >-
            Tools to append to the assistant's existing tool configuration.
        compliancePlan:
          description: >-
            Compliance settings to apply, including HIPAA and PCI behavior,
            security filtering, and recording consent.
        keypadInputPlan:
          description: >-
            Configuration for collecting and processing DTMF keypad input.
        serverMessages:
          items:
            x-fern-enum:
              "transcript[transcriptType='final']":
                name: FinalTranscript
    Assistant:
      description: >-
        A saved assistant configuration returned by the Vapi API. It defines
        how the assistant listens, reasons, speaks, handles conversations,
        sends events, and produces artifacts and analysis.
      properties:
        firstMessageInterruptionsEnabled:
          description: >-
            Set to `true` to allow the user to interrupt the assistant while it
            speaks the first message. Default is `false`.
        compliancePlan:
          description: >-
            Compliance settings for the assistant, including HIPAA and PCI
            behavior, security filtering, and recording consent.
        keypadInputPlan:
          description: >-
            Configuration for collecting and processing DTMF keypad input
            during calls.
        serverMessages:
          items:
            x-fern-enum:
              "transcript[transcriptType='final']":
                name: FinalTranscript
    UpdateAssistantDTO:
      description: >-
        Fields used to update an existing assistant. Include only the settings
        you want to change; omitted fields retain their current values.
      properties:
        firstMessageInterruptionsEnabled:
          description: >-
            Set to `true` to allow the user to interrupt the assistant while it
            speaks the first message. Default is `false`.
        compliancePlan:
          description: >-
            Compliance settings for the assistant, including HIPAA and PCI
            behavior, security filtering, and recording consent.
        keypadInputPlan:
          description: >-
            Configuration for collecting and processing DTMF keypad input
            during calls.
        serverMessages:
          items:
            x-fern-enum:
              "transcript[transcriptType='final']":
                name: FinalTranscript
    CreateSquadDTO:
      description: >-
        Configuration used to create a squad. Provide an ordered list of
        assistant members and optional overrides that control how the squad
        handles a conversation and transfers between assistants.
    Squad:
      description: >-
        A saved squad configuration that coordinates a group of assistants
        during a conversation. The first member starts the call, and member
        destinations control transfers between assistants.
    UpdateSquadDTO:
      description: >-
        Configuration used to update an existing squad, including its name,
        ordered members, and shared assistant overrides.
    SquadMemberDTO:
      description: >-
        An assistant member of a squad. Reference a saved assistant or provide
        a transient assistant, then configure member-specific overrides and
        destinations for transfers.
      properties:
        assistantDestinations:
          description: >-
            Assistants this squad member can route the conversation to through
            a transfer or handoff.
    CreateFileDTO:
      description: >-
        A file-upload request containing the file to store and process in Vapi.
    File:
      description: >-
        An uploaded file record, including its processing status, storage
        details, extracted-text location, metadata, and lifecycle timestamps.
      properties:
        object:
          description: The object type. This is always `file`.
        status:
          description: The current processing status of the uploaded file.
        originalName:
          description: The original name of the uploaded file.
        bytes:
          description: The size of the uploaded file in bytes.
        purpose:
          description: The intended use assigned to the uploaded file.
        mimetype:
          description: The MIME type of the uploaded file.
        key:
          description: The object-storage key for the uploaded file.
        path:
          description: The object-storage path for the uploaded file.
        bucket:
          description: The object-storage bucket containing the uploaded file.
        url:
          description: The URL used to access the uploaded file.
        parsedTextUrl:
          description: The URL used to access text extracted from the file.
        parsedTextBytes:
          description: The size of the extracted text in bytes.
        metadata:
          description: Additional metadata associated with the uploaded file.
    UpdateFileDTO:
      description: >-
        Fields used to update an uploaded file. Currently, the file name can be
        changed.
    Campaign:
      description: >-
        A saved outbound calling campaign, including its calling configuration,
        schedule, status, customers, calls, and call-progress counters.
    CampaignPaginatedResponse:
      description: >-
        A paginated collection of outbound calling campaigns and metadata
        describing the result set.
      properties:
        results:
          description: The campaigns returned for the current page.
        metadata:
          description: Pagination metadata for the campaign result set.
    CreateCampaignDTO:
      description: >-
        Configuration used to create an outbound calling campaign. Choose an
        assistant, squad, or workflow, then provide customers, phone-number or
        dial-plan settings, and an optional schedule.
    UpdateCampaignDTO:
      description: >-
        Fields used to update an outbound calling campaign, including its name,
        status, calling resource, phone-number or dial-plan settings, and
        schedule.
    CreateStructuredOutputDTO:
      description: >-
        Configuration used to create a structured-output definition that
        extracts validated data from calls using an AI model or regular
        expression.
    StructuredOutput:
      description: >-
        A saved structured-output definition containing its extraction schema,
        execution method, model or regular expression, linked resources, and
        lifecycle metadata.
    StructuredOutputPaginatedResponse:
      description: >-
        A paginated collection of structured-output definitions and metadata
        describing the result set.
      properties:
        results:
          description: The structured-output definitions returned for the current page.
        metadata:
          description: Pagination metadata for the structured-output result set.
    StructuredOutputRunDTO:
      description: >-
        A request to run a saved or transient structured-output definition
        against one or more calls, either as a preview or as an artifact update.
    UpdateStructuredOutputDTO:
      description: >-
        Fields used to update a structured-output definition, including its
        name, extraction schema, execution method, model or regular expression,
        compliance settings, and linked resources.
    CreateBarInsightFromCallTableDTO:
      description: >-
        Configuration used to create a bar-chart insight from call data using
        metric queries, formulas, grouping, and a stepped time range.
      properties:
        timeRange:
          description: >-
            The time range and interval used to aggregate the bar-chart data.
    CreateLineInsightFromCallTableDTO:
      description: >-
        Configuration used to create a line-chart insight from call data using
        metric queries, formulas, grouping, and a stepped time range.
      properties:
        timeRange:
          description: >-
            The time range and interval used to aggregate the line-chart data.
    CreatePieInsightFromCallTableDTO:
      description: >-
        Configuration used to create a pie-chart insight from call data using
        metric queries, formulas, grouping, and a time range.
      properties:
        timeRange:
          description: The time range used to query the pie-chart data.
    CreateTextInsightFromCallTableDTO:
      description: >-
        Configuration used to create a text-value insight from call data using
        metric queries, a formula, and a time range.
      properties:
        timeRange:
          description: The time range used to query the text-value data.
    BarInsight:
      description: >-
        A saved bar-chart insight containing its call-data queries, formulas,
        grouping, stepped time range, metadata, and lifecycle information.
      properties:
        timeRange:
          description: >-
            The time range and interval used to aggregate the bar-chart data.
    LineInsight:
      description: >-
        A saved line-chart insight containing its call-data queries, formulas,
        grouping, stepped time range, metadata, and lifecycle information.
      properties:
        timeRange:
          description: >-
            The time range and interval used to aggregate the line-chart data.
    PieInsight:
      description: >-
        A saved pie-chart insight containing its call-data queries, formulas,
        grouping, time range, and lifecycle information.
      properties:
        timeRange:
          description: The time range used to query the pie-chart data.
    TextInsight:
      description: >-
        A saved text-value insight containing its call-data queries, formula,
        time range, and lifecycle information.
      properties:
        timeRange:
          description: The time range used to query the text-value data.
    UpdateBarInsightFromCallTableDTO:
      description: >-
        Fields used to update a bar-chart insight, including its queries,
        formulas, grouping, time range, metadata, and name.
      properties:
        timeRange:
          description: >-
            The time range and interval used to aggregate the bar-chart data.
    UpdateLineInsightFromCallTableDTO:
      description: >-
        Fields used to update a line-chart insight, including its queries,
        formulas, grouping, time range, metadata, and name.
      properties:
        timeRange:
          description: >-
            The time range and interval used to aggregate the line-chart data.
    UpdatePieInsightFromCallTableDTO:
      description: >-
        Fields used to update a pie-chart insight, including its queries,
        formulas, grouping, time range, and name.
      properties:
        timeRange:
          description: The time range used to query the pie-chart data.
    UpdateTextInsightFromCallTableDTO:
      description: >-
        Fields used to update a text-value insight, including its queries,
        formula, time range, and name.
      properties:
        timeRange:
          description: The time range used to query the text-value data.
    InsightPaginatedResponse:
      description: >-
        A paginated collection of saved reporting insights and metadata
        describing the result set.
      properties:
        results:
          description: The reporting insights returned for the current page.
        metadata:
          description: Pagination metadata for the insight result set.
    InsightRunDTO:
      description: >-
        Options for running a saved insight, including optional time-range and
        output-format overrides.
      properties:
        formatPlan:
          description: Output-formatting instructions applied to the insight run.
    InsightRunResponse:
      description: >-
        Metadata identifying a saved insight run and its lifecycle timestamps.
      properties:
        id:
          description: The unique identifier for the insight run.
        insightId:
          description: The unique identifier for the insight that was run.
        orgId:
          description: The unique identifier for the organization that owns the run.
        createdAt:
          description: The ISO 8601 timestamp when the insight run was created.
        updatedAt:
          description: The ISO 8601 timestamp when the insight run was last updated.
    AnalyticsQueryDTO:
      description: >-
        A request containing one or more metric queries to run against call or
        subscription data.
    AnalyticsQueryResult:
      description: >-
        The result of a named analytics query, including the evaluated time
        range and returned metric data.
    CreateEvalDTO:
      description: >-
        Configuration used to create a reusable eval containing a mock
        conversation and checkpoints for assessing assistant responses and tool
        calls.
    UpdateEvalDTO:
      description: >-
        Fields used to update an eval, including its name, description, mock
        conversation messages, and eval type.
    Eval:
      description: >-
        A saved eval definition containing its mock conversation, checkpoints,
        descriptive metadata, type, and lifecycle information.
      properties:
        id:
          description: The unique identifier for the eval.
        orgId:
          description: The unique identifier for the organization that owns the eval.
        createdAt:
          description: The ISO 8601 timestamp when the eval was created.
        updatedAt:
          description: The ISO 8601 timestamp when the eval was last updated.
    EvalPaginatedResponse:
      description: >-
        A paginated collection of saved eval definitions and metadata describing
        the result set.
      properties:
        results:
