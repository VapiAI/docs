    TelnyxPhoneNumber:
      title: TelnyxPhoneNumber
      description: >-
        A Telnyx phone number connected to Vapi, including its credential,
        routing, hooks, server settings, and lifecycle metadata.
    PhoneNumberPaginatedResponse:
      description: >-
        A paginated collection of phone numbers and metadata describing the
        result set.
    PaginationMeta:
      description: >-
        Pagination and retention metadata returned with a paginated list of
        phone numbers.
      properties:
        itemsPerPage:
          description: The number of phone numbers returned per page.
        totalItems:
          description: The total number of phone numbers matching the request.
        currentPage:
          description: The current page number.
        itemsBeyondRetention:
          description: >-
            Whether additional matching phone numbers exist beyond the
            organization's data-retention window.
        createdAtLe:
          description: >-
            The inclusive upper creation-time boundary applied to the result
            set.
        createdAtGe:
          description: >-
            The inclusive lower creation-time boundary applied to the result
            set.
