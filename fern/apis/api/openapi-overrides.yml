      description: >-
        Aggregated call costs and usage, including transport, transcription,
        model, voice, Vapi, analysis, token, and character totals.
    AnalysisCostBreakdown:
      description: >-
        Analysis costs and token usage grouped by summary, structured data,
        success evaluation, and structured-output generation.
    SubscriptionLimits:
      description: >-
        Organization concurrency limits and remaining concurrent call capacity.
    TransportCost:
      title: TransportCost
      description: >-
        Telephony transport cost for a call, including provider, billable
        minutes, and amount.
      properties:
        provider:
          description: Telephony or transport provider that generated the cost.
    TranscriberCost:
      title: TranscriberCost
      description: >-
        Speech-to-text cost for a call, including transcriber, billable minutes,
        and amount.
    ModelCost:
      title: ModelCost
      description: >-
        Language-model cost for a call, including model, token usage, and amount.
    VoiceCost:
      title: VoiceCost
      description: >-
        Voice-synthesis cost for a call, including voice, character usage, and
        amount.
    VapiCost:
      title: VapiCost
      description: >-
        Vapi platform cost for a call, including cost subtype, billable minutes,
        and amount.
    VoicemailDetectionCost:
      title: VoicemailDetectionCost
      description: >-
        Voicemail-detection model cost, including provider, model, multimodal
        token usage, and amount.
    AnalysisCost:
      title: AnalysisCost
      description: >-
        Cost for an individual analysis request, including analysis type, model,
        token usage, and amount.
    KnowledgeBaseCost:
      title: KnowledgeBaseCost
      description: >-
        Knowledge-base model cost, including model, token usage, and amount.
