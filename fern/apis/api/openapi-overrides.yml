          description: >-
            The regular expression pattern matched against the customer's
            speech.
    StartSpeakingPlan:
      description: >-
        Controls when the assistant begins speaking after customer speech,
        including the minimum wait, endpointing strategy, and custom endpointing
        rules.
    StopSpeakingPlan:
      description: >-
        Controls when the assistant stops speaking after a customer
        interruption, including word and voice thresholds, restart delay, and
        phrase exceptions.
    BackgroundSpeechDenoisingPlan:
      description: >-
        Controls smart and Fourier denoising applied to customer audio before
        transcription.
    TranscriptionEndpointingPlan:
      description: >-
        Controls endpointing delays based on whether customer speech ends with
        punctuation, without punctuation, or with a number.
