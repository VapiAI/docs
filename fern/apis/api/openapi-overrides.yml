      description: >-
        Controls whether Krisp smart denoising filters background speech and
        noise.
    FourierDenoisingPlan:
      description: >-
        Configuration for Fourier denoising, including media detection,
        thresholds, baseline calculation, and analysis window.
    VoicemailDetectionBackoffPlan:
      description: >-
        Controls voicemail-detection retry timing, including when retries start,
        retry frequency, and maximum attempts.
    AnalysisPlan:
      description: >-
        Configuration for post-call analysis of summaries, structured-data
        extraction, success evaluation, and outcomes.
    SummaryPlan:
      description: >-
        Controls generation of a post-call summary, including prompt messages,
        enablement, and request timeout.
    StructuredDataPlan:
      description: >-
        Controls extraction of post-call structured data, including prompt
        messages, JSON schema, enablement, and request timeout.
    StructuredDataMultiPlan:
      description: >-
        Associates a catalog key with a structured data extraction plan.
    SuccessEvaluationPlan:
      description: >-
        Controls post-call success evaluation, including the rubric, prompt
        messages, enablement, and request timeout.
    ArtifactPlan:
      description: >-
        Controls artifacts generated and stored for calls, including recordings,
        packet captures, logs, transcripts, structured outputs, scorecards, and
        custom storage paths.
    TranscriptPlan:
      description: >-
        Controls whether the call transcript is stored and the speaker names
        used in the transcript.
    MonitorPlan:
      description: >-
        Controls real-time listening and control for assistant calls,
        authentication requirements for monitor URLs, and attached monitors.
      properties:
        monitorIds:
          description: >-
            IDs of the monitors attached to the assistant. Use this field for
            transient assistants or to update the monitors attached to an
            existing assistant. Defaults to an empty array.
    CompliancePlan:
      description: >-
        Controls HIPAA and PCI requirements, transcript security filtering, and
        recording-consent handling for assistant calls.
      properties:
        recordingConsentPlan:
          description: >-
            Controls how recording consent is requested before the assistant
            joins the call.
    RecordingConsentPlanStayOnLine:
      description: >-
        Configuration for requesting recording consent by treating continued
        presence on the call as consent, including the announcement voice and
        wait time.
      properties:
        type:
          description: >-
            Identifies a stay-on-line recording-consent plan, which treats
            remaining on the call as consent.
    RecordingConsentPlanVerbal:
      description: >-
        Configuration for requesting explicit verbal recording consent,
        including the announcement voice and action to take when the customer
        declines.
      properties:
        type:
          description: >-
            Identifies a verbal recording-consent plan that requires the
            customer to explicitly consent or decline.
    SecurityFilterBase:
      description: >-
        Base configuration for a security filter applied to transcripts before
        model processing.
    SecurityFilterPlan:
      description: >-
        Controls filtering of transcripts for security threats before content
        is sent to the assistant's language model, including filter selection,
        handling mode, and replacement text.
    SQLInjectionSecurityFilter:
      description: Filters potential SQL injection patterns from transcripts.
    XSSSecurityFilter:
      description: >-
        Filters potential cross-site scripting (XSS) patterns from transcripts.
    SSRFSecurityFilter:
      description: >-
        Filters potential server-side request forgery (SSRF) patterns from
        transcripts.
    RCESecurityFilter:
      description: >-
        Filters potential remote code execution (RCE) patterns from transcripts.
    PromptInjectionSecurityFilter:
      description: Filters potential prompt-injection patterns from transcripts.
    RegexSecurityFilter:
      description: >-
        Filters transcript content that matches a custom regular expression.
    BackoffPlan:
      description: >-
        Controls retry behavior for failed server requests, including strategy,
        maximum retries, base delay, and status codes excluded from retries.
      properties:
        baseDelaySeconds:
          description: >-
            Base delay in seconds. For fixed backoff, this is the delay between
            retries. For exponential backoff, this is the initial delay.
        excludedStatusCodes:
          description: >-
            HTTP status codes that should not trigger a retry. By default, any
            non-2xx status code not listed here can be retried.
    Server:
      description: >-
        Configuration for requests Vapi sends to a customer server, including
        URL, authentication, headers, timeout, encryption, static IP addresses,
        and retry behavior.
    CallHookCallEnding:
      description: >-
        Runs configured actions when a call is ending, optionally only when its
        filters match.
    CallHookAssistantSpeechInterrupted:
      description: >-
        Runs configured actions when the customer's speech interrupts the
        assistant.
    CallHookCustomerSpeechInterrupted:
      description: >-
        Runs configured actions when the assistant interrupts the customer's
        speech.
    CallHookCustomerSpeechTimeout:
      description: >-
        Runs configured actions when the customer does not speak before the
        configured timeout, with support for trigger limits and named instances.
      properties:
        options:
          description: >-
            Controls the speech timeout, maximum trigger count, and counter
            reset behavior for this hook.
    ToolCallHookAction:
      description: >-
        A hook action that invokes an inline tool or an existing tool when the
        hook triggers.
    MessageAddHookAction:
      description: >-
        A hook action that adds an OpenAI-format message to the conversation and
        can trigger an assistant response.
    CallHookFilter:
      description: >-
        Matches a call field against one or more allowed values to determine
        whether a hook runs.
    SayHookAction:
      description: >-
        A hook action that makes the assistant speak exact text or generate a
        response from a prompt.
    CustomerSpeechTimeoutOptions:
      description: >-
        Controls how long a hook waits for customer speech, how often it can
        trigger, and when its trigger counter resets.
      properties:
        triggerResetMode:
          description: >-
            Controls whether the hook's trigger counter resets after the
            customer speaks. Defaults to `never`.
